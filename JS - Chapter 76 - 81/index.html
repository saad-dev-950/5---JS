<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="#">Assignments</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Chapter 76 - 81</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>

            </div>

    <main>
        <div class="container">
            <div class="text-center">
                <h4 class="mt-4">Chapter # 76 - 81 | Browser Control | Popups</h4>
                <hr>
            </div>

        <div class="container">
            <div class="row">
                <div class="col">
                    <div class="card d-inline-block p-4 my-4">
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-danger" onclick="whereWeAt()">Where We At</button>
                            <button class="btn btn-danger" onclick="goToGoogle()">Go To Google</button>
                            <button class="btn btn-danger" onclick="replaceURL()">Replace URL</button>
                            <button class="btn btn-danger" onclick="openPopup()">Open Popup</button>
                            <button class="btn btn-danger" onclick="fillContent()">Fill Content in Popup</button>
                            <button class="btn btn-danger" onclick="assignURL()">Assign URL To Popup</button>
                            <button class="btn btn-danger" onclick="closePopup()">Close Popup</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row">
                <div class="text-center">
                    <h3 class="mt-5">Output / Result</h3>
                    <div class="card p-3" id="Output"></div>
                    <button class="btn btn-outline-dark my-3" onclick="clearOutput()">Clear Output</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
