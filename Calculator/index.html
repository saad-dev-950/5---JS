<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS 5.3.8 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">
    <!-- Logo -->
    <link rel="icon" href="Assets/Images/JS Logo.png">
    <title>Calculator | Made by SJ</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container p-2 d-flex justify-content-center">
                <h4 class="mb-0 text-white">Calculator | Made by SJ</h4>
            </div>
        </nav>
    </header>

    <main>
       <div class="container my-5 d-flex justify-content-center">
         <div class="calculator">
            <div class="screen" id="display">0</div>

            <div class="buttons-grid">
                <button class="btn-clear" onclick="clearAll()">C</button>
                <button class="btn-del" onclick="backspace()">DEL</button>
                <button onclick="appendToDisplay('/')">/</button>
                <button onclick="appendToDisplay('*')">×</button>

                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('-')">-</button>

                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button style="grid-row: span 2; height: 150px;" onclick="appendToDisplay('+')">+</button>

                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>

                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('00')">00</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button class="btn-equal" onclick="calculate()">=</button>
            </div>
        </div>
       </div>
    </main>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col">
                    <p class="mb-0 p-3 text-white text-center">
                        &copy; <span id="year"></span> | Designed by SJ | All Rights Reserved.
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS 5.3.8 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!-- Custom JS -->
    <script src="JS/script.js"></script>
</body>

</html>
