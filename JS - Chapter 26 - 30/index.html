<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5.3.8 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">
    <!-- Icon -->
    <link rel="icon" href="Assets/Images/JS Logo.png">
    <title>JS | Chapter 26 - 30</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="#">Assignments</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Chapter 26 - 30</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="text-center">
                <h4 class="mt-4">Chapter # 26 - 30 | Numbers, Integers & Decimals</h4>
                <hr>
            </div>
            <div class="container">
                <div class="row">
                    <div class="col-12 col-md-6 mt-3">
                        <h4 class="text-center">Input</h4>
                        <div class="card d-flex gap-2 flex-row">
                            <input type="text" id="inputText" class="form-control form-control-lg bg-transparent"
                                placeholder="Type your text here">
                            <button class="btn btn-outline-dark" onclick="clearInput()">Clear</button>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 mt-3">
                        <h4 class="text-center">Original Number</h4>
                        <div class="card d-flex justify-content-center align-items-center h-75" id="originalText">
                            <h1 class="">25.12345</h1>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12 col-md-6">
                        <h4 class="text-center mt-5">Buttons</h4>
                        <div class="card1 d-inline-block p-4 mb-2 mb-md-3 mb-lg-5">
                            <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
                                <button class="btn btn-danger" onclick="roundNumber()">Round A Number</button>
                                <button class="btn btn-danger" onclick="ceilNumber()">Ceil A Number</button>
                                <button class="btn btn-danger" onclick="floorNumber()">Floor A Number</button>
                                <button class="btn btn-danger" onclick="generateRandomNumber()">Generate A Random
                                    Number</button>
                                <button class="btn btn-danger" onclick="throwDice()">Throw A Dice</button>
                                <button class="btn btn-danger" onclick="generateStrongPassword()">Generate A Strong
                                    Password</button>
                                <button class="btn btn-danger" onclick="convertStrings()">Converting Strings</button>
                                <button class="btn btn-danger" onclick="controlLength()">Controlling Length</button>
                                <button class="btn btn-danger" onclick="calculateGST()">Calculate GST</button>

                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <h4 class="text-center mt-5">Output / Result</h4>
                        <div class="card1" id="Output">

                        </div>
                        <div class="text-center">
                            <button class="btn btn-outline-dark my-2" onclick="clearButton()">Clear Output</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col">
                    <p class="text-white text-center p-3 mb-0">
                        &copy; <span id="year"></span> | Designed by SJ | All Rights Reserved.
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5.3.8 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!-- Custom JS -->
    <script src="JS/script.js"></script>
</body>

</html>
