<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5.3.8 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">

    <!-- Icon -->
     <link rel="icon" href="Assets/Images/logo (1).png">
    <title>JS | Chapter 1 - 7</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark" id="nav-top">
            <div class="container">
                <a class="navbar-brand" href="#">Assignments</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Chapter 1 - 7</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="text-center">
                <h4 class="mt-4">Chapter # 1 - 7 | Introduction to JavaScript | Data Types | Alerts | Arithmetic
                    Operators</h4>
                <hr>
                <div class="row">
                    <div class="col">
                        <div class="card d-inline-block p-4 my-5">
                            <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
                                <button class="btn btn-danger" id="alertString">Alert Name</button>
                                <button class="btn btn-danger" id="alertNumber">Alert Number</button>
                                <button class="btn btn-danger" id="VariableNames">Show Variable Names</button>
                                <button class="btn btn-danger" id="camelCase">Show camelCase Examples</button>
                                <button class="btn btn-danger" id="Addition">Sum 2 Numbers</button>
                                <button class="btn btn-danger" id="Subtraction">Subtract 2 Numbers</button>
                                <button class="btn btn-danger mt-2" id="Multiplication">Multiply 2 Numbers</button>
                                <button class="btn btn-danger mt-2" id="Division">Divide 2 Numbers</button>
                                <button class="btn btn-danger mt-2" id="Calculation">Calculate Some Numbers</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="container">
                    <div class="text-center">
                        <h4 class="mt-5">Original Statement</h4>
                        <div class="row">
                            <div class="col">
                                <div class="card p-3" id="statement"></div>
                                <button class="btn btn-outline-dark mt-3 mb-5" id="clr-statement">Clear
                                     Statement</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="container">
                    <div class="text-center">
                        <h4>Output / Result</h4>
                        <div class="row">
                            <div class="col">
                                <div class="card p-3" id="output"></div>
                                <button class="btn btn-outline-dark mt-3 mb-5" id="clr-output">Clear Output</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container-fluid p-3" id="foot">
            <div class="text-center">
                <p class="mb-0 text-white">
                    &copy; <span id="year"></span> | Designed by SJ | All Rights Reserved.
                </p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5.3.8 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="JS/script.js"></script>
</body>

</html>
