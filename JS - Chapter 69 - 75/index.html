<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS 5.3.8 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">
    <!-- Logo -->
    <link rel="icon" href="Assets/Images/JS Logo.png">
    <title>JS | Chapter 69 - 75</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="#">Assignments</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Chapter 69 - 75</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <h4 class="mt-4 text-center">Chapter # 69 - 75 | Objects, Properties, Methods, Constructors and Prototypes
            </h4>
            <hr>
        </div>

        <div class="container">
            <div class="row">
                <div class="col-12 col-md-6">
                    <h4 class="text-center mt-3">Buttons</h4>
                    <div class="card p-4 mb-2 mb-md-3 mb-lg-5">
                        <button class="btn btn-danger" onclick="showImage()">Show Image</button>
                        <button class="btn btn-danger my-2" onclick="showTable()">Show Table</button>
                        <button class="btn btn-danger" onclick="printUsers()" title="Open the console (Press F5) to see the results.">Print Users in Console</button>
                    </div>
                </div>

                <div class="col-12 col-md-6">
                    <h4 class="mt-3 text-center">Form</h4>
                    <div class="card d-inline-block p-4 mb-2 mb-md-3 mb-lg-5">
                        <form onsubmit="handleSubmit(event)">
                            <div class="row mb-3">
                                <div class="col-12 col-lg-6">
                                    <input type="text" name="firstName" id="firstName" placeholder="First Name"
                                        class="form-control bg-transparent">
                                </div>
                                <div class="col-12 col-lg-6 my-3 mt-lg-0">
                                    <input type="text" name="lastName" id="lastName" class="form-control bg-transparent"
                                        placeholder="Last Name">
                                </div>
                                <div class="col-12 col-lg-6">
                                    <input type="email" name="email" id="email" class="form-control bg-transparent"
                                        placeholder="Email">
                                </div>
                                <div class="col-12 col-lg-6 mt-3 mt-lg-0">
                                    <input type="date" name="dob" id="dob" class="form-control bg-transparent">
                                </div>
                            </div>
                            <input type="submit" value="Add User"
                                class="btn btn-success w-50 w-sm-100 m-auto d-block"></input>
                        </form>
                    </div>


                </div>
            </div>

            <div class="row">


                <div class="col-12 col-md-6 w-100">
                    <h4 class="text-center mt-2">Output / Result</h4>
                    <div class="card1" id="Output">

                    </div>
                    <div class="text-center">
                        <button class="btn btn-outline-dark my-2" onclick="clearButton()">Clear Output</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col">
                    <p class="mb-0 p-3 text-white text-center">
                        &copy; <span id="year"></span> | Designed by SJ | All Rights Reserved.
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS 5.3.8 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!-- Custom JS -->
    <script src="JS/script.js"></script>


    <!-- Bootstrap Image Model -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Hosting Plans</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImage" src="Assets/Images/Hosting_Plans.png" alt="Hosting Plans" class="img-fluid rounded">
                </div>
            </div>
        </div>
    </div>

</body>

</html>
